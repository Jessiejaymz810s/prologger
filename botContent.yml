kind: BotDefinition
entity:
  schemaName: crb81_houzahbalah
  cdsBotId: a59346e7-53c4-ef11-b8e8-6045bd026d95
  accessControlPolicy: ChatbotReaders
  authenticationMode: Integrated
  authenticationTrigger: Always
  configuration:
    settings:
      default-2.1.0:
        content:
          conversationStarters:
            - $kind: ConversationStarter
              diagnostics:
              text: "Can you provide an update on the status of case #12345?"
              title: Case Status Update

            - $kind: ConversationStarter
              diagnostics:
              text: I need to log a new case regarding a customer complaint.
              title: Log New Case

            - $kind: ConversationStarter
              diagnostics:
              text: "What are the details of case #67890?"
              title: Case Details

            - $kind: ConversationStarter
              diagnostics:
              text: "Please close case #54321 as it has been resolved."
              title: Close Case

            - $kind: ConversationStarter
              diagnostics:
              text: "Reopen case #98765 as the issue has resurfaced."
              title: Reopen Case

            - $kind: ConversationStarter
              diagnostics:
              text: "Who is assigned to case #11223?"
              title: Case Assignment

          description: An agent designed to help track and manage cases, providing updates and ensuring all details are logged accurately.
          displayName: houzahbalah
          instructions: |-
            - Acknowledge that the user has emotions and reflect that in interactions.
            - Respond empathetically and consider the user's feelings in responses.
            - Maintain a friendly and collaborative tone.
            - Avoid using technical jargon or overly complex language.
            - Provide clear and concise information.
            - Be patient and understanding in all interactions.

        spec:
          connectors:
          knowledgeSources:
            publicSites:
              - description: This knowledge source searches information on the web found in https://www.youtube.com/ website
                name: https://www.youtube.com/
                site: https://www.youtube.com/

            sharepointSites:

    aISettings:
      useModelKnowledge: true

  language: 1033

